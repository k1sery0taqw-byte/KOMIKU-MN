<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOMIKU - Манга Сайт</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; }
    header { background: #1a1a2e; padding: 20px; text-align: center; border-bottom: 2px solid #e94560; }
    header h1 { color: #e94560; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
    
    .search-box { display: flex; padding: 15px; gap: 10px; max-width: 600px; margin: 0 auto; }
    .search-box input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; font-size: 16px; }
    .search-box button { padding: 10px 25px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

    .filter-btns { display: flex; gap: 10px; padding: 10px; flex-wrap: wrap; justify-content: center; }
    .filter-btns button { padding: 8px 18px; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; background: #1a1a2e; color: #ccc; }
    .filter-btns button.active { background: #e94560; color: #fff; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
    .card { background: #161625; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
    .card:hover { transform: translateY(-5px); border-color: #e94560; }
    .card img { width: 100%; height: 220px; object-fit: cover; }
    .card p { padding: 10px; font-size: 14px; text-align: center; font-weight: 500; height: 55px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    .loading { text-align: center; padding: 50px; font-size: 18px; color: #e94560; font-weight: bold; width: 100%; grid-column: 1 / -1; }
    
    #chapters { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; overflow-y: auto; z-index: 998; padding: 20px; }
    #backBtn { background: #e94560; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    .chapter-item { background: #1a1a2e; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; border-left: 4px solid #e94560; }

    #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; overflow-y: auto; z-index: 999; }
    #reader img { width: 100%; max-width: 800px; display: block; margin: 0 auto; }
    #closeBtn { position: fixed; top: 15px; right: 15px; background: rgba(233, 69, 96, 0.8); color: #fff; border: none; padding: 12px 18px; border-radius: 50%; cursor: pointer; z-index: 1000; font-weight: bold; }
  </style>
</head>
<body>
  <header><h1>📚 KOMIKU</h1></header>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Манга хайх..." />
    <button onclick="searchManga()">Хайх</button>
  </div>

  <div class="filter-btns">
    <button id="btn-all" class="active" onclick="filterType('', this)">Бүгд</button>
    <button onclick="filterType('ja', this)">Манга 🇯🇵</button>
    <button onclick="filterType('ko', this)">Манхва 🇰🇷</button>
    <button onclick="filterType('zh', this)">Манхуа 🇨🇳</button>
  </div>

  <div id="grid" class="grid">
    <div class="loading">Уншиж байна...</div>
  </div>

  <div id="chapters">
    <button onclick="closeChapters()" id="backBtn">← Буцах</button>
    <h2 id="mangaTitle" style="margin-bottom:20px;"></h2>
    <div id="chapterList"></div>
  </div>

  <div id="reader">
    <button id="closeBtn" onclick="closeReader()">✕</button>
    <div id="pages"></div>
  </div>

  <script>
    const API_BASE = 'https://api.mangadex.org';
    
    // Прокси ашиглахгүйгээр шууд хандаж үзэх, болохгүй бол AllOrigins ашиглах функц
    async function fetchData(url) {
      try {
        // Эхлээд шууд хандаж үзэх
        const response = await fetch(url);
        if (response.ok) return await response.json();
        throw new Error('Direct fetch failed');
      } catch (err) {
        // Хэрэв шууд болохгүй бол CORS прокси ашиглах
        try {
          const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
          const res = await fetch(proxyUrl);
          const data = await res.json();
          return JSON.parse(data.contents);
        } catch (proxyErr) {
          console.error("Мэдээлэл авахад алдаа гарлаа:", proxyErr);
          return null;
        }
      }
    }

    async function loadManga(lang = '', query = '') {
      const grid = document.getElementById('grid');
      grid.innerHTML = '<div class="loading">Мэдээллийг ачаалж байна...</div>';
      
      let url = `${API_BASE}/manga?limit=24&includes[]=cover_art&contentRating[]=safe&contentRating[]=suggestive`;
      if (lang) url += `&originalLanguage[]=${lang}`;
      if (query) url += `&title=${encodeURIComponent(query)}`;
      else url += `&order[followedCount]=desc`;

      const data = await fetchData(url);
      if (data && data.data) {
        displayManga(data.data);
      } else {
        grid.innerHTML = '<div class="loading" style="color: #ff4d4d">Мэдээлэл олдсонгүй. Хуудсаа дахин шинэчилнэ үү (Refresh).</div>';
      }
    }

    function displayManga(list) {
      const grid = document.getElementById('grid');
      grid.innerHTML = list.map(m => {
        const cover = m.relationships.find(r => r.type === 'cover_art');
        const fileName = cover ? cover.attributes.fileName : '';
        const imgUrl = fileName ? `https://uploads.mangadex.org/covers/${m.id}/${fileName}.256.jpg` : 'https://via.placeholder.com/150x220?text=No+Cover';
        const title = m.attributes.title.en || Object.values(m.attributes.title)[0] || 'Нэргүй';
        
        return `
          <div class="card" onclick="openChapters('${m.id}', '${title.replace(/'/g, "\\'")}')">
            <img src="${imgUrl}" alt="${title}">
            <p>${title}</p>
          </div>`;
      }).join('');
    }

    async function openChapters(mangaId, title) {
      document.getElementById('mangaTitle').innerText = title;
      document.getElementById('chapters').style.display = 'block';
      const listDiv = document.getElementById('chapterList');
      listDiv.innerHTML = '<div class="loading">Бүлгүүдийг уншиж байна...</div>';

      const data = await fetchData(`${API_BASE}/manga/${mangaId}/feed?translatedLanguage[]=en&order[chapter]=desc&limit=50`);
      if (data && data.data) {
        listDiv.innerHTML = data.data.map(c => `
          <div class="chapter-item" onclick="readChapter('${c.id}')">
            Бүлэг ${c.attributes.chapter || 'Тусгай'} ${c.attributes.title ? ': ' + c.attributes.title : ''}
          </div>
        `).join('');
      } else {
        listDiv.innerHTML = '<div class="loading">Бүлэг олдсонгүй (English)</div>';
      }
    }

    async function readChapter(chapterId) {
      document.getElementById('reader').style.display = 'block';
      const pagesDiv = document.getElementById('pages');
      pagesDiv.innerHTML = '<div class="loading">Зургийг ачаалж байна...</div>';

      const data = await fetchData(`${API_BASE}/at-home/server/${chapterId}`);
      if (data) {
        const host = data.baseUrl;
        const hash = data.chapter.hash;
        const files = data.chapter.data;
        pagesDiv.innerHTML = files.map(f => `<img src="${host}/data/${hash}/${f}" loading="lazy">`).join('');
      }
    }

    function filterType(lang, btn) {
      document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadManga(lang);
    }

    function searchManga() {
      const q = document.getElementById('searchInput').value;
      if (q) loadManga('', q);
    }

    function closeChapters() { document.getElementById('chapters').style.display = 'none'; }
    function closeReader() { document.getElementById('reader').style.display = 'none'; }

    // Эхлэл
    loadManga();
  </script>
</body>
</html>
