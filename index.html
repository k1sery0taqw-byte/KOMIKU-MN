<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOMIKU — Монгол Манга, Манхва</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mongolian&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════ VARIABLES ══════════════════ */
:root {
  --bg: #0a0a0f;
  --bg2: #111117;
  --bg3: #16161f;
  --card: #1a1a25;
  --cardH: #20202e;
  --border: #2a2a3d;
  --accent: #6366f1;
  --a2: #818cf8;
  --pink: #ec4899;
  --cyan: #22d3ee;
  --green: #22c55e;
  --red: #f43f5e;
  --yellow: #fbbf24;
  --text: #e2e2f0;
  --muted: #6b6b95;
  --muted2: #9898b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 70px;
  overflow-x: hidden;
}

/* ══════════════════ HEADER ══════════════════ */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(10,10,15,.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(42,42,61,.6);
  height: 56px;
  padding: 0 1rem;
  display: flex; align-items: center; gap: .7rem;
}

.logo {
  font-size: 1.3rem; font-weight: 900;
  letter-spacing: .5px; cursor: pointer; flex-shrink: 0;
  background: linear-gradient(135deg, #818cf8 0%, #22d3ee 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.hdr-search {
  flex: 1; display: flex; align-items: center; gap: .4rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: .35rem 1rem;
  transition: border-color .2s;
}
.hdr-search:focus-within { border-color: var(--accent); }
.hdr-search input {
  background: none; border: none; outline: none;
  color: var(--text); font-size: .82rem; width: 100%; font-family: inherit;
}
.hdr-search input::placeholder { color: var(--muted); }

#auth-area { display: flex; align-items: center; gap: .4rem; margin-left: auto; flex-shrink: 0; }

.btn-reg, .btn-login {
  padding: .3rem .8rem; border-radius: 20px;
  font-size: .75rem; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: all .2s;
}
.btn-reg { background: transparent; border: 1px solid var(--border); color: var(--muted2); }
.btn-reg:hover { border-color: var(--a2); color: var(--a2); }
.btn-login { background: var(--accent); border: none; color: #fff; }
.btn-login:hover { opacity: .88; }

.avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; font-weight: 700; position: relative;
}

.avm-wrap { position: relative; }
.avm {
  position: absolute; top: calc(100%+8px); right: 0; min-width: 200px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; display: none; z-index: 500;
  box-shadow: 0 12px 40px rgba(0,0,0,.6);
}
.avm.open { display: block; }
.avm-email { padding: .6rem 1rem .4rem; font-size: .7rem; color: var(--muted); border-bottom: 1px solid var(--border); }
.avm a {
  display: block; padding: .65rem 1rem; font-size: .82rem;
  cursor: pointer; transition: background .15s;
}
.avm a:hover { background: var(--card); }
.avm .avm-admin { color: var(--a2); }
.avm .avm-logout { color: var(--red); border-top: 1px solid var(--border); }

/* ══════════════════ BOTTOM NAV ══════════════════ */
.bnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; height: 62px;
  background: rgba(10,10,15,.97); backdrop-filter: blur(20px);
  border-top: 1px solid rgba(42,42,61,.6);
  display: flex;
}
.bni {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; color: var(--muted); cursor: pointer;
  font-size: .6rem; font-weight: 500; transition: color .2s;
}
.bni.on, .bni:hover { color: var(--a2); }
.bni svg { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }

/* ══════════════════ PAGES ══════════════════ */
.pg { display: none; } .pg.on { display: block; }

/* ══════════════════ HERO BANNER ══════════════════ */
.hero-wrap {
  position: relative; overflow: hidden; height: 240px;
  background: var(--bg2);
}
@media(min-width:600px){ .hero-wrap { height: 340px; } }

.hero-slide {
  position: absolute; inset: 0;
  opacity: 0; transition: opacity .6s ease;
  display: flex; align-items: flex-end;
}
.hero-slide.on { opacity: 1; }

.hero-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center top;
  filter: brightness(.45);
}

.hero-grad {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,10,15,1) 0%, rgba(10,10,15,.5) 40%, transparent 70%);
}

.hero-content {
  position: relative; z-index: 2;
  padding: 1.25rem 1.1rem 1.4rem; width: 100%;
}

.hero-badge {
  display: inline-block; padding: .18rem .55rem; border-radius: 4px;
  font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: .5rem; background: var(--accent); color: #fff;
}

.hero-title {
  font-size: clamp(1.1rem, 4vw, 1.7rem); font-weight: 800;
  line-height: 1.2; margin-bottom: .3rem;
  text-shadow: 0 2px 8px rgba(0,0,0,.5);
}

.hero-meta { font-size: .72rem; color: var(--muted2); margin-bottom: .65rem; display: flex; gap: .5rem; flex-wrap: wrap; }
.hero-meta span { display: flex; align-items: center; gap: .22rem; }

.hero-btns { display: flex; gap: .5rem; }
.h-btn {
  padding: .45rem 1rem; border-radius: 7px; font-size: .78rem;
  font-weight: 700; cursor: pointer; font-family: inherit;
  transition: all .2s; display: flex; align-items: center; gap: .35rem;
  border: none;
}
.h-btn-primary { background: var(--accent); color: #fff; }
.h-btn-primary:hover { opacity: .88; }
.h-btn-ghost { background: rgba(255,255,255,.12); color: #fff; backdrop-filter: blur(4px); }
.h-btn-ghost:hover { background: rgba(255,255,255,.2); }

/* Hero dots */
.hero-dots {
  position: absolute; bottom: 1rem; right: 1rem; z-index: 3;
  display: flex; gap: .35rem;
}
.hero-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,.3); cursor: pointer; transition: all .2s;
}
.hero-dot.on { background: #fff; width: 18px; border-radius: 3px; }

/* ══════════════════ SECTIONS ══════════════════ */
.sec { padding: 1.1rem 1rem; max-width: 1400px; margin: 0 auto; }
.sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .85rem; }
.sec-title { font-size: .95rem; font-weight: 700; display: flex; align-items: center; gap: .45rem; }
.sec-title::before {
  content: ''; width: 3px; height: 1em; border-radius: 2px; display: block;
  background: linear-gradient(var(--a2), var(--cyan));
}
.sec-more { color: var(--a2); font-size: .72rem; cursor: pointer; }

/* Latest chapters horizontal scroll */
.hscroll {
  display: flex; gap: .6rem; overflow-x: auto; padding-bottom: .5rem;
  scrollbar-width: none;
}
.hscroll::-webkit-scrollbar { display: none; }

.ch-card {
  flex-shrink: 0; width: 130px; cursor: pointer;
  border-radius: 8px; overflow: hidden; background: var(--card);
  transition: transform .2s; position: relative;
}
.ch-card:hover { transform: translateY(-2px); }
.ch-cover { aspect-ratio: 2/3; position: relative; overflow: hidden; background: var(--bg3); }
.ch-cover img { width: 100%; height: 100%; object-fit: cover; }
.ch-new {
  position: absolute; top: 5px; right: 5px;
  background: var(--pink); color: #fff;
  font-size: .55rem; font-weight: 700; padding: 2px 5px; border-radius: 3px;
  text-transform: uppercase;
}
.ch-info { padding: .42rem .5rem .5rem; }
.ch-title { font-size: .68rem; font-weight: 600; line-height: 1.3; margin-bottom: .15rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.ch-num { font-size: .6rem; color: var(--a2); font-weight: 600; }

/* ══════════════════ MANGA GRID ══════════════════ */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr); gap: .6rem;
}
@media(min-width:480px){ .grid { grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); } }
@media(min-width:768px){ .grid { grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: .85rem; } }

.card {
  cursor: pointer; border-radius: 9px; overflow: hidden;
  background: var(--card); transition: transform .2s, box-shadow .2s;
  position: relative;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(99,102,241,.2); }
.cover { position: relative; aspect-ratio: 2/3; overflow: hidden; background: var(--bg3); }
.cover img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
.card:hover .cover img { transform: scale(1.05); }

.type-badge {
  position: absolute; top: 6px; left: 6px;
  font-size: .52rem; font-weight: 700; padding: 2px 5px;
  border-radius: 3px; text-transform: uppercase; color: #fff;
}
.type-manhwa { background: #db2777; }
.type-manhua { background: #d97706; }
.type-manga  { background: #2563eb; }

.hrt {
  position: absolute; top: 5px; right: 5px; width: 27px; height: 27px;
  border-radius: 50%; background: rgba(0,0,0,.65); border: none;
  cursor: pointer; font-size: .9rem; display: flex; align-items: center;
  justify-content: center; z-index: 2; transition: all .2s;
}
.hrt:hover { transform: scale(1.12); }
.hrt.on { color: var(--pink); }

.rating-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,.7));
  padding: .8rem .4rem .25rem;
  display: flex; align-items: center; gap: .2rem;
}
.star-val { font-size: .62rem; font-weight: 700; color: var(--yellow); }

.ci { padding: .48rem .52rem .55rem; }
.ct { font-size: .7rem; font-weight: 600; line-height: 1.3; margin-bottom: .18rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.cm { font-size: .6rem; color: var(--muted2); display: flex; gap: .3rem; align-items: center; }

/* Skeleton */
@keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.sk {
  background: linear-gradient(90deg, var(--card) 25%, var(--cardH) 50%, var(--card) 75%);
  background-size: 200% 100%; animation: sh 1.5s infinite; border-radius: 3px;
}
.sk-card { border-radius: 9px; overflow: hidden; background: var(--card); }
.sk-c { aspect-ratio: 2/3; } .sk-c.sk { border-radius: 0; }
.sk-p { padding: .48rem .52rem; }
.sk-l { height: .58rem; margin-bottom: .28rem; }

/* ══════════════════ FILTERS ══════════════════ */
.frow {
  display: flex; gap: .4rem; overflow-x: auto; padding-bottom: .4rem;
  margin-bottom: .85rem; scrollbar-width: none;
}
.frow::-webkit-scrollbar { display: none; }
.fbtn {
  flex-shrink: 0; padding: .3rem .82rem; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--muted2); font-size: .73rem; font-weight: 500;
  cursor: pointer; transition: all .2s; font-family: inherit; white-space: nowrap;
}
.fbtn:hover, .fbtn.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ══════════════════ DETAIL PAGE ══════════════════ */
.det-hero {
  background: var(--bg2); padding: 1.25rem 1rem;
  border-bottom: 1px solid var(--border);
}
.det-row { display: flex; gap: 1rem; margin-bottom: 1.1rem; }
.det-cover {
  width: 115px; min-width: 115px; border-radius: 10px;
  overflow: hidden; box-shadow: 0 8px 28px rgba(0,0,0,.6); flex-shrink: 0;
}
.det-cover img { width: 100%; display: block; }
.det-title { font-size: clamp(.95rem,3.5vw,1.4rem); font-weight: 800; line-height: 1.2; margin-bottom: .35rem; }
.det-tags { display: flex; flex-wrap: wrap; gap: .3rem; margin: .45rem 0; }
.det-tag {
  padding: .18rem .5rem; background: rgba(99,102,241,.12);
  border: 1px solid rgba(99,102,241,.2); border-radius: 3px;
  font-size: .62rem; color: var(--a2);
}
.det-desc { color: var(--muted2); font-size: .78rem; line-height: 1.7; margin: .4rem 0; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.det-stats { display: flex; gap: 1.25rem; margin-top: .55rem; }
.det-stat-val { font-size: .9rem; font-weight: 700; text-transform: capitalize; }
.det-stat-lbl { font-size: .6rem; color: var(--muted); }
.det-btns { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .8rem; }
.dbtn {
  padding: .5rem 1.1rem; border-radius: 8px; font-size: .8rem; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all .2s;
}
.dbtn-primary { background: linear-gradient(135deg, var(--accent), #4f46e5); border: none; color: #fff; }
.dbtn-primary:hover { opacity: .88; }
.dbtn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; gap: .3rem; }
.dbtn-ghost:hover, .dbtn-ghost.on { border-color: var(--pink); color: var(--pink); background: rgba(236,72,153,.08); }

/* Chapter list */
.ch-list { display: flex; flex-direction: column; gap: .3rem; margin-top: .85rem; }
.ch-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: .65rem .9rem; background: var(--card); border-radius: 8px;
  cursor: pointer; transition: background .2s; border: 1px solid transparent;
}
.ch-item:hover { background: var(--cardH); border-color: var(--border); }
.ch-item.read { opacity: .55; }
.ch-num { font-weight: 600; font-size: .8rem; }
.ch-date { font-size: .65rem; color: var(--muted); }
.read-tag { font-size: .58rem; background: var(--green); color: #fff; padding: 1px 5px; border-radius: 10px; margin-left: .4rem; }

/* ══════════════════ READER ══════════════════ */
#pg-reader { background: #000; min-height: 100vh; }
.rbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(0,0,0,.97); border-bottom: 1px solid #1c1c1c;
  padding: .5rem 1rem; display: flex; align-items: center; gap: .5rem;
}
.r-title { font-size: .78rem; font-weight: 600; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.rctrls { display: flex; gap: .3rem; }
.rbtn {
  padding: .28rem .65rem; background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 5px; color: var(--text); font-size: .7rem;
  cursor: pointer; font-family: inherit; transition: all .2s;
}
.rbtn:hover { background: var(--accent); border-color: var(--accent); }
.rpages { max-width: 800px; margin: 0 auto; }
.rpages img { width: 100%; display: block; }
.rend { padding: 1.75rem; text-align: center; color: var(--muted2); font-size: .82rem; }
.rend button {
  margin: .3rem; padding: .48rem 1.1rem; border: none; border-radius: 7px;
  color: #fff; font-size: .78rem; font-weight: 600; cursor: pointer;
  font-family: inherit; background: var(--accent); transition: opacity .2s;
}
.rend button:hover { opacity: .85; }
.rend .back-ch { background: var(--card); border: 1px solid var(--border); color: var(--text); }

/* ══════════════════ AUTH MODAL ══════════════════ */
.overlay {
  position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,.8);
  display: none; align-items: center; justify-content: center; padding: 1rem;
}
.overlay.open { display: flex; }
.mbox {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 18px; width: 100%; max-width: 380px;
  padding: 1.75rem; position: relative;
}
.mclose { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; }
.mtitle { font-size: 1.25rem; font-weight: 800; text-align: center; margin-bottom: 1.15rem; }
.mtabs { display: flex; gap: .4rem; background: var(--card); border-radius: 8px; padding: .22rem; margin-bottom: 1.1rem; }
.mtab {
  flex: 1; padding: .46rem; background: none; border: none; border-radius: 6px;
  color: var(--muted); font-size: .8rem; font-weight: 600; cursor: pointer;
  transition: all .2s; font-family: inherit;
}
.mtab.on { background: var(--accent); color: #fff; }
.ainp {
  width: 100%; padding: .62rem .88rem; background: var(--card);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-size: .83rem; margin-bottom: .6rem; outline: none; font-family: inherit;
  transition: border-color .2s;
}
.ainp:focus { border-color: var(--accent); }
.abtn {
  width: 100%; padding: .68rem; background: linear-gradient(135deg, var(--accent), #4f46e5);
  border: none; border-radius: 9px; color: #fff; font-size: .88rem; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: opacity .2s;
}
.abtn:hover { opacity: .88; } .abtn:disabled { opacity: .45; cursor: not-allowed; }
.amsg { font-size: .75rem; margin-bottom: .45rem; min-height: .9rem; padding: .1rem 0; }
.amsg.err { color: var(--red); } .amsg.ok { color: var(--green); }

/* ══════════════════ MISC ══════════════════ */
.back-btn {
  display: inline-flex; align-items: center; gap: .35rem;
  color: var(--muted2); cursor: pointer; font-size: .78rem;
  margin-bottom: 1rem; transition: color .2s;
}
.back-btn:hover { color: var(--text); }

.load-more {
  display: block; margin: 1.25rem auto; padding: .56rem 1.7rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: .78rem; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all .2s;
}
.load-more:hover { background: var(--accent); border-color: var(--accent); }

.empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: .82rem; }

.spin {
  display: inline-block; width: 28px; height: 28px;
  border: 2.5px solid var(--border); border-top-color: var(--a2);
  border-radius: 50%; animation: rot .7s linear infinite;
}
@keyframes rot { to { transform: rotate(360deg); } }
.ctr { text-align: center; padding: 2.5rem; }

.toast {
  position: fixed; bottom: 74px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--border); border-radius: 9px;
  padding: .48rem 1.1rem; font-size: .78rem; color: var(--text); z-index: 700;
  opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap;
  box-shadow: 0 6px 24px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 1rem; text-align: center; color: var(--muted); font-size: .7rem; margin-top: 1.5rem; }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="go('home')">KOMIKU</div>
  <div class="hdr-search">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="q" type="text" placeholder="Манга хайх..." onkeydown="onSearch(event)">
  </div>
  <div id="auth-area">
    <button class="btn-reg" onclick="openAuth('register')">Бүртгүүлэх</button>
    <button class="btn-login" onclick="openAuth('login')">Нэвтрэх</button>
  </div>
</header>

<nav class="bnav">
  <div class="bni on" id="bn-home" onclick="go('home')">
    <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Нүүр
  </div>
  <div class="bni" id="bn-browse" onclick="go('browse')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>Бүгд
  </div>
  <div class="bni" id="bn-bookmarks" onclick="go('bookmarks')">
    <svg viewBox="0 0 24 24"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>Дуртай
  </div>
</nav>

<!-- ════ HOME ════ -->
<div id="pg-home" class="pg on">
  <!-- Hero Banner -->
  <div class="hero-wrap" id="hero-wrap">
    <div class="ctr" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
      <div class="spin"></div>
    </div>
  </div>
  <div class="hero-dots" id="hero-dots"></div>

  <!-- Latest chapters -->
  <div class="sec">
    <div class="sec-head">
      <h2 class="sec-title">🕒 Шинэ бүлгүүд</h2>
    </div>
    <div class="hscroll" id="g-latest-ch"></div>
  </div>

  <!-- Popular -->
  <div class="sec">
    <div class="sec-head">
      <h2 class="sec-title">🔥 Эрэлттэй манга</h2>
      <span class="sec-more" onclick="go('browse')">Бүгд →</span>
    </div>
    <div class="grid" id="g-popular"></div>
  </div>

  <footer>KOMIKU · Монгол манга платформ</footer>
</div>

<!-- ════ BROWSE ════ -->
<div id="pg-browse" class="pg">
  <div class="sec">
    <h1 style="font-size:1.2rem;font-weight:800;margin-bottom:.85rem">Бүх бүтээл</h1>
    <div class="frow" id="type-bar">
      <button class="fbtn on" onclick="setType('all',this)">Бүгд</button>
      <button class="fbtn" onclick="setType('manhwa',this)">Манхва 🇰🇷</button>
      <button class="fbtn" onclick="setType('manga',this)">Манга 🇯🇵</button>
      <button class="fbtn" onclick="setType('manhua',this)">Манхуа 🇨🇳</button>
    </div>
    <div class="grid" id="g-browse"></div>
    <button class="load-more" onclick="loadMoreBrowse()">Цааш үзэх</button>
  </div>
</div>

<!-- ════ DETAIL ════ -->
<div id="pg-detail" class="pg">
  <div id="det-body"></div>
</div>

<!-- ════ READER ════ -->
<div id="pg-reader" class="pg">
  <div class="rbar">
    <span class="r-title" id="r-tit">Уншиж байна…</span>
    <div class="rctrls">
      <button class="rbtn" onclick="chNav(-1)">← Өмнөх</button>
      <button class="rbtn" onclick="go('detail',cManga)">≡ Жагсаалт</button>
      <button class="rbtn" onclick="chNav(1)">Дараах →</button>
    </div>
  </div>
  <div class="rpages" id="r-pages"><div class="ctr"><div class="spin"></div></div></div>
</div>

<!-- ════ SEARCH ════ -->
<div id="pg-search" class="pg">
  <div class="sec">
    <h1 style="font-size:1.1rem;font-weight:800;margin-bottom:.85rem" id="s-title">Хайлт</h1>
    <div class="grid" id="g-search"></div>
  </div>
</div>

<!-- ════ BOOKMARKS ════ -->
<div id="pg-bookmarks" class="pg">
  <div class="sec">
    <h1 style="font-size:1.1rem;font-weight:800;margin-bottom:.85rem">♥ Дуртай манга</h1>
    <div id="bm-body"><div class="empty">Нэвтэрсний дараа харах боломжтой.</div></div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="overlay" id="auth-modal">
  <div class="mbox">
    <button class="mclose" onclick="closeAuth()">✕</button>
    <div class="mtitle">
      <span style="background:linear-gradient(135deg,#818cf8,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent">KOMIKU</span>
    </div>
    <div class="mtabs">
      <button class="mtab on" id="t-login" onclick="switchTab('login')">Нэвтрэх</button>
      <button class="mtab" id="t-reg" onclick="switchTab('register')">Бүртгүүлэх</button>
    </div>
    <div id="amsg" class="amsg"></div>
    <input id="ae" type="email" placeholder="И-мэйл хаяг" class="ainp">
    <input id="ap" type="password" placeholder="Нууц үг" class="ainp" onkeydown="if(event.key==='Enter')doAuth()">
    <button id="asub" class="abtn" onclick="doAuth()">Нэвтрэх</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
⚙️ SUPABASE ХОЛБОЛТ
══════════════════════════════════════════ */
const SB_URL = 'https://unalluevfphdpjzxtceq.supabase.co';
const SB_KEY = 'sb_publishable_UX4T2Ar-deHNsX66wGgvwA_ZjCq2M-n';

// ⚠️ ADMIN EMAILS — зөвхөн эдгээр имэйл Admin panel руу орох эрхтэй
const ADMIN_EMAILS = [
  'Baynmonh1223@gmail.com',
  'baynmonh1223@gmail.com'
];

const sb = window.supabase.createClient(SB_URL, SB_KEY);
let user = null;
let bmSet = new Set();
let readSet = new Set();
let mgCache = {};
let cManga = null, cChapter = null;
let chapters = [];
let browseType = 'all', browseOffset = 0;
let heroSlides = [], heroTimer = null, heroIndex = 0;
let authMode = 'login';

const $ = id => document.getElementById(id);

/* ── TOAST ── */
function toast(msg, dur=2400) {
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

/* ── UTILS ── */
const esc = s => String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function skels(n) {
  return Array(n).fill(`<div class="sk-card"><div class="sk-c sk"></div><div class="sk-p"><div class="sk-l sk" style="width:78%"></div><div class="sk-l sk" style="width:50%"></div></div></div>`).join('');
}
function typeLabel(t) {
  if(t==='manhwa') return {lb:'Манхва',cls:'manhwa'};
  if(t==='manhua') return {lb:'Манхуа',cls:'manhua'};
  return {lb:'Манга',cls:'manga'};
}

/* ── NAVIGATION ── */
function go(page, id) {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('on'));
  $(`bn-${page}`)?.classList.add('on');
  window.scrollTo(0,0);

  if(page==='home') {
    $('pg-home').classList.add('on');
    if(!$('g-popular').children.length) loadHome();
  } else if(page==='browse') {
    $('pg-browse').classList.add('on');
    $('bn-browse')?.classList.add('on');
    browseOffset=0;
    $('g-browse').innerHTML=skels(18);
    loadBrowse(true);
  } else if(page==='detail'&&id) {
    cManga=id; $('pg-detail').classList.add('on');
    loadDetail(id);
  } else if(page==='reader'&&id) {
    $('pg-reader').classList.add('on'); loadReader(id);
  } else if(page==='search') {
    $('pg-search').classList.add('on');
  } else if(page==='bookmarks') {
    $('pg-bookmarks').classList.add('on');
    $('bn-bookmarks')?.classList.add('on');
    loadBookmarks();
  }
}

/* ══ HOME ══ */
async function loadHome() {
  // Fetch manga from Supabase
  const [{ data: mangas }, { data: latestChs }] = await Promise.all([
    sb.from('mangas').select('*').order('created_at',{ascending:false}).limit(12),
    sb.from('chapters')
      .select('*, mangas(title, cover_url, type)')
      .order('created_at',{ascending:false}).limit(20)
  ]);

  // Hero banner
  buildHero(mangas || []);

  // Latest chapters
  const chHtml = (latestChs||[]).filter(c=>c.mangas).map(c=>`
    <div class="ch-card" onclick="go('detail','${c.manga_id}')">
      <div class="ch-cover">
        <img src="${c.mangas.cover_url||''}" alt="" loading="lazy">
        <span class="ch-new">Шинэ</span>
      </div>
      <div class="ch-info">
        <div class="ch-title">${esc(c.mangas.title)}</div>
        <div class="ch-num">Бүлэг ${c.chapter_number}</div>
      </div>
    </div>
  `).join('');
  $('g-latest-ch').innerHTML = chHtml || '<div class="empty">Бүлэг байхгүй байна</div>';

  // Popular
  const popHtml = (mangas||[]).map(cardHtml).join('');
  $('g-popular').innerHTML = popHtml || '<div class="empty">Манга байхгүй байна</div>';
}

/* ── HERO ── */
function buildHero(mangas) {
  const wrap = $('hero-wrap');
  const dots = $('hero-dots');
  heroSlides = mangas.slice(0,5);
  if(!heroSlides.length) { wrap.innerHTML=''; return; }

  wrap.innerHTML = heroSlides.map((m,i)=>{
    const tp = typeLabel(m.type);
    return `<div class="hero-slide ${i===0?'on':''}" id="hs-${i}">
      <div class="hero-bg" style="background-image:url('${m.cover_url||''}')"></div>
      <div class="hero-grad"></div>
      <div class="hero-content">
        <span class="hero-badge">${tp.lb}</span>
        <h1 class="hero-title">${esc(m.title)}</h1>
        <div class="hero-meta">
          <span>📖 ${m.status==='completed'?'Дууссан':'Үргэлжилж буй'}</span>
        </div>
        <div class="hero-btns">
          <button class="h-btn h-btn-primary" onclick="go('detail','${m.id}')">▶ Унших</button>
          <button class="h-btn h-btn-ghost" onclick="go('detail','${m.id}')">ℹ Дэлгэрэнгүй</button>
        </div>
      </div>
    </div>`;
  }).join('');

  dots.innerHTML = heroSlides.map((_,i)=>`<div class="hero-dot ${i===0?'on':''}" onclick="setHero(${i})"></div>`).join('');

  clearInterval(heroTimer);
  heroIndex = 0;
  heroTimer = setInterval(()=>setHero((heroIndex+1)%heroSlides.length), 4000);
}

function setHero(i) {
  heroIndex = i;
  document.querySelectorAll('.hero-slide').forEach((s,j)=>s.classList.toggle('on',j===i));
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('on',j===i));
}

/* ── CARD HTML ── */
function cardHtml(m) {
  const tp = typeLabel(m.type||'manga');
  mgCache[m.id] = {title:m.title,cover:m.cover_url,type:m.type};
  const bm = bmSet.has(m.id)?'on':'';
  return `<div class="card" onclick="go('detail','${m.id}')">
    <div class="cover">
      <img src="${m.cover_url||''}" alt="${esc(m.title)}" loading="lazy">
      <span class="type-badge type-${tp.cls}">${tp.lb}</span>
      <button class="hrt ${bm}" onclick="toggleBm(event,'${m.id}')">
        ${bmSet.has(m.id)?'♥':'♡'}
      </button>
    </div>
    <div class="ci">
      <div class="ct">${esc(m.title)}</div>
      <div class="cm"><span style="text-transform:capitalize">${m.status==='completed'?'Дууссан':'Үргэлжилж буй'}</span></div>
    </div>
  </div>`;
}

/* ── BROWSE ── */
async function loadBrowse(reset) {
  if(reset) { browseOffset=0; $('g-browse').innerHTML=skels(18); }
  let q = sb.from('mangas').select('*').order('created_at',{ascending:false}).range(browseOffset, browseOffset+17);
  if(browseType!=='all') q = q.eq('type', browseType);
  const {data} = await q;
  const html = (data||[]).map(cardHtml).join('');
  if(reset) $('g-browse').innerHTML = html || '<div class="empty">Манга байхгүй байна</div>';
  else $('g-browse').innerHTML += html;
  browseOffset += 18;
}

function setType(t, btn) {
  document.querySelectorAll('#type-bar .fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); browseType=t; loadBrowse(true);
}

function loadMoreBrowse() { loadBrowse(false); }

/* ── DETAIL ── */
async function loadDetail(id) {
  $('det-body').innerHTML='<div class="ctr"><div class="spin"></div></div>';
  const {data:m} = await sb.from('mangas').select('*').eq('id',id).single();
  if(!m) { $('det-body').innerHTML='<div class="empty">Манга олдсонгүй</div>'; return; }

  const tp = typeLabel(m.type||'manga');
  const bm = bmSet.has(id)?'on':'';
  mgCache[id] = {title:m.title,cover:m.cover_url,type:m.type};

  $('det-body').innerHTML=`
    <div class="det-hero">
      <span class="back-btn" onclick="go('browse')">← Буцах</span>
      <div class="det-row">
        <div class="det-cover"><img src="${m.cover_url||''}" alt="${esc(m.title)}"></div>
        <div>
          <span class="type-badge type-${tp.cls}" style="position:static;display:inline-block;margin-bottom:.35rem">${tp.lb}</span>
          <h1 class="det-title">${esc(m.title)}</h1>
          <p class="det-desc">${esc(m.description||'Тайлбар байхгүй байна.')}</p>
          <div class="det-stats">
            <div><div class="det-stat-val">${m.status==='completed'?'Дууссан':'Үргэлжилж буй'}</div><div class="det-stat-lbl">Төлөв</div></div>
            ${m.year?`<div><div class="det-stat-val">${m.year}</div><div class="det-stat-lbl">Он</div></div>`:''}
          </div>
          <div class="det-btns">
            <button class="dbtn dbtn-ghost ${bm}" id="det-bm" onclick="toggleBm(null,'${id}')">
              ${bmSet.has(id)?'♥ Хадгалсан':'♡ Хадгалах'}
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="sec">
      <h2 class="sec-title" style="margin-bottom:.75rem">Бүлгүүд</h2>
      <div class="ch-list" id="det-ch-list"><div class="ctr"><div class="spin"></div></div></div>
    </div>
  `;
  loadChapters(id);
}

async function loadChapters(mangaId) {
  const {data} = await sb.from('chapters')
    .select('*').eq('manga_id',mangaId).order('chapter_number');
  chapters = data||[];
  $('det-ch-list').innerHTML = chapters.map(c=>{
    const isRead = readSet.has(c.id);
    return `<div class="ch-item ${isRead?'read':''}" onclick="openReader('${c.id}','Бүлэг ${c.chapter_number}','${mangaId}')">
      <span class="ch-num">Бүлэг ${c.chapter_number}${c.title?` — ${esc(c.title)}`:''}
        ${isRead?'<span class="read-tag">✓</span>':''}
      </span>
      <span class="ch-date">${new Date(c.created_at).toLocaleDateString('mn-MN')}</span>
    </div>`;
  }).join('') || '<div class="empty">Бүлэг байхгүй байна</div>';
}

/* ── READER ── */
function openReader(chId, label, mangaId) {
  cChapter=chId; cManga=mangaId||cManga;
  $('r-tit').textContent=label;
  go('reader', chId);
  loadReader(chId);
  if(user&&mangaId) saveRead(mangaId, chId);
}

async function loadReader(chId) {
  cChapter=chId;
  $('r-pages').innerHTML='<div class="ctr"><div class="spin"></div></div>';
  const {data:pages} = await sb.from('chapter_pages')
    .select('*').eq('chapter_id',chId).order('page_number');
  if(!pages?.length) {
    $('r-pages').innerHTML='<div class="empty">Зураг олдсонгүй</div>'; return;
  }
  const idx = chapters.findIndex(c=>c.id===chId);
  const num = chapters[idx]?.chapter_number||'?';
  $('r-pages').innerHTML=
    pages.map((p,i)=>`<img src="${p.image_url}" alt="Хуудас ${i+1}" loading="${i<3?'eager':'lazy'}">`).join('')+
    `<div class="rend"><p style="margin-bottom:.65rem">— Бүлэг ${num} төгсөв —</p>
      ${idx>0?`<button onclick="chNav(-1);scrollTo(0,0)">← Өмнөх</button>`:''}
      ${idx<chapters.length-1?`<button onclick="chNav(1);scrollTo(0,0)">Дараах →</button>`:''}
      <button class="back-ch" onclick="go('detail',cManga)">Жагсаалт</button>
    </div>`;
}

function chNav(dir) {
  const idx = chapters.findIndex(c=>c.id===cChapter);
  const next = idx+dir;
  if(next>=0&&next<chapters.length) {
    const c=chapters[next];
    openReader(c.id,`Бүлэг ${c.chapter_number}`,cManga);
  } else {
    toast(dir===1?'Сүүлийн бүлэг':'Эхний бүлэг');
  }
}

async function saveRead(mangaId, chId) {
  if(!readSet.has(chId)) {
    readSet.add(chId);
    await sb.from('read_chapters').insert({user_id:user.id, chapter_id:chId, manga_id:mangaId});
  }
}

/* ── BOOKMARKS ── */
async function toggleBm(e, mangaId) {
  if(e){e.stopPropagation();e.preventDefault();}
  if(!user){openAuth('login');toast('Нэвтэрч орно уу');return;}
  const adding=!bmSet.has(mangaId);
  const meta=mgCache[mangaId]||{};
  if(adding) {
    bmSet.add(mangaId);
    await sb.from('favorites').upsert({user_id:user.id,manga_id:mangaId,manga_title:meta.title||'',cover_url:meta.cover||''},{onConflict:'user_id,manga_id'});
    toast('♥ Хадгалагдлаа!');
  } else {
    bmSet.delete(mangaId);
    await sb.from('favorites').delete().match({user_id:user.id,manga_id:mangaId});
    toast('Жагсаалтаас хасав.');
  }
  document.querySelectorAll('.hrt').forEach(btn=>{
    if((btn.getAttribute('onclick')||'').includes(`'${mangaId}'`)) {
      btn.textContent=adding?'♥':'♡'; btn.classList.toggle('on',adding);
    }
  });
  const db=$('det-bm');
  if(db&&cManga===mangaId){db.textContent=adding?'♥ Хадгалсан':'♡ Хадгалах';db.classList.toggle('on',adding);}
}

async function loadBookmarks() {
  const body=$('bm-body');
  if(!user){body.innerHTML='<div class="empty">Нэвтэрч орно уу</div>';return;}
  body.innerHTML='<div class="ctr"><div class="spin"></div></div>';
  const {data}=await sb.from('favorites').select('*').eq('user_id',user.id);
  if(!data?.length){body.innerHTML='<div class="empty">Дуртай манга байхгүй байна</div>';return;}
  body.innerHTML=`<div class="sec"><div class="grid">${data.map(b=>`
    <div class="card" onclick="go('detail','${b.manga_id}')">
      <div class="cover">
        <img src="${b.cover_url||''}" alt="${esc(b.manga_title)}" loading="lazy">
        <button class="hrt on" onclick="toggleBm(event,'${b.manga_id}')">♥</button>
      </div>
      <div class="ci"><div class="ct">${esc(b.manga_title)}</div></div>
    </div>`).join('')}</div></div>`;
}

/* ── SEARCH ── */
function onSearch(e) {
  if(e.key!=='Enter') return;
  const q=$('q').value.trim(); if(!q) return;
  go('search'); $('s-title').textContent=`"${q}" хайлтын илэрц`;
  $('g-search').innerHTML=skels(12);
  sb.from('mangas').select('*').ilike('title',`%${q}%`).limit(20)
    .then(({data})=>{$('g-search').innerHTML=(data||[]).map(cardHtml).join('')||'<div class="empty">Илэрц олдсонгүй</div>';});
}

/* ── AUTH ── */
function openAuth(mode='login') {
  authMode=mode; switchTab(mode);
  $('auth-modal').classList.add('open');
  setTimeout(()=>$('ae').focus(),100);
}
function closeAuth() { $('auth-modal').classList.remove('open'); $('amsg').textContent=''; }
$('auth-modal').addEventListener('click',e=>{if(e.target===$('auth-modal'))closeAuth();});

function switchTab(mode) {
  authMode=mode;
  $('t-login').classList.toggle('on',mode==='login');
  $('t-reg').classList.toggle('on',mode==='register');
  $('asub').textContent=mode==='login'?'Нэвтрэх':'Бүртгүүлэх';
  $('amsg').textContent=''; $('amsg').className='amsg';
}

async function doAuth() {
  const email=$('ae').value.trim(), pass=$('ap').value;
  const btn=$('asub');
  if(!email||!pass){setMsg('Бүх талбарыг бөглөнө үү.','err');return;}
  if(pass.length<6){setMsg('Нууц үг 6-аас дээш тэмдэгт','err');return;}
  btn.disabled=true; btn.textContent='Түр хүлээнэ үү…';
  try {
    let data,error;
    if(authMode==='login') ({data,error}=await sb.auth.signInWithPassword({email,password:pass}));
    else ({data,error}=await sb.auth.signUp({email,password:pass}));
    if(error) throw error;
    user=data.user||data.session?.user;
    if(user){
      if(authMode==='register') setMsg('✓ Бүртгэл амжилттай!','ok');
      else { closeAuth(); toast(`Тавтай морил, ${user.email.split('@')[0]}!`); }
      await loadUserData(); updateAuthUI();
    }
  } catch(err) { setMsg(err.message||'Алдаа гарлаа.','err'); }
  btn.disabled=false; btn.textContent=authMode==='login'?'Нэвтрэх':'Бүртгүүлэх';
}

function setMsg(msg,cls) { const el=$('amsg'); el.textContent=msg; el.className=`amsg ${cls}`; }

async function doLogout() {
  await sb.auth.signOut();
  user=null; bmSet.clear(); readSet.clear(); updateAuthUI();
  toast('Амжилттай гарлаа.');
  if($('pg-bookmarks').classList.contains('on')) go('home');
}

async function loadUserData() {
  if(!user) return;
  const [{data:favs},{data:reads}] = await Promise.all([
    sb.from('favorites').select('manga_id').eq('user_id',user.id),
    sb.from('read_chapters').select('chapter_id').eq('user_id',user.id)
  ]);
  bmSet = new Set((favs||[]).map(b=>b.manga_id));
  readSet = new Set((reads||[]).map(r=>r.chapter_id));
}

function isAdmin(email) {
  return ADMIN_EMAILS.map(e=>e.toLowerCase()).includes((email||'').toLowerCase());
}

function updateAuthUI() {
  const area=$('auth-area');
  if(user) {
    const init=(user.email||'U')[0].toUpperCase();
    const adminLink = isAdmin(user.email)
      ? `<a class="avm-admin" onclick="window.location.href='admin.html'">⚙️ Admin Panel</a>`
      : '';
    area.innerHTML=`<div class="avm-wrap">
      <div class="avatar" onclick="this.nextElementSibling.classList.toggle('open');event.stopPropagation()">${init}</div>
      <div class="avm">
        <div class="avm-email">${user.email}</div>
        <a onclick="go('bookmarks')">♥ Дуртай</a>
        ${adminLink}
        <a class="avm-logout" onclick="doLogout()">→ Гарах</a>
      </div>
    </div>`;
  } else {
    area.innerHTML=`<button class="btn-reg" onclick="openAuth('register')">Бүртгүүлэх</button>
      <button class="btn-login" onclick="openAuth('login')">Нэвтрэх</button>`;
  }
}

document.addEventListener('click',()=>document.querySelectorAll('.avm').forEach(m=>m.classList.remove('open')));

/* ── STARTUP ── */
async function init() {
  try {
    const {data:{session}}=await sb.auth.getSession();
    if(session?.user){user=session.user;await loadUserData();updateAuthUI();}
  } catch {}
  loadHome();
  sb.auth.onAuthStateChange(async(_,session)=>{
    if(session?.user){user=session.user;await loadUserData();updateAuthUI();}
    else{user=null;bmSet.clear();readSet.clear();updateAuthUI();}
  });
}

init();
</script>
</body>
</html>
